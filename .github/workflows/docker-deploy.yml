name: CI/CD - Build, Push, Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Publish app
        run: dotnet publish -c Release -o out

      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/sample-pay:${{ github.sha }}
          outputs: type=registry
        
      - name: Set image output
        run: echo "IMAGE=ghcr.io/${{ github.repository_owner }}/sample-pay:${{ github.sha }}" >> $GITHUB_OUTPUT

  migrate-db:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Install EF Core tools
        run: dotnet tool restore || true

      - name: Apply EF Core migrations
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION }}
        run: |
          dotnet tool install --global dotnet-ef --version 8.0.0 || true
          export PATH="$HOME/.dotnet/tools:$PATH"
          dotnet ef database update --connection "$ConnectionStrings__DefaultConnection"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure Web App (Container)
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ghcr.io/${{ github.repository_owner }}/sample-pay:${{ github.sha }}
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_PUBLISH_PROFILE }}

# Secrets required:
# - GITHUB_TOKEN (provided automatically) or REGISTRY_TOKEN if using other registry
# - DB_CONNECTION: full connection string for the target database
# - AZURE_PUBLISH_PROFILE: Azure Web App publish profile (XML) for deployment
# - AZURE_WEBAPP_NAME: name of the Azure Web App configured for container deployment
